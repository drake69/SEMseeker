# CI: R CMD check + testthat — macOS only for now; re-enable Windows/Linux once green
on:
  push:
    branches-ignore: [main, master]   # direct push to main/master is blocked
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:
    inputs:
      os:
        description: 'Run on a single OS (or "all")'
        type: choice
        default: 'all'
        options:
          - all
          - ubuntu-latest
          - macos-latest
          - windows-latest

name: R-CMD-check

jobs:
  # Build the OS matrix dynamically so that workflow_dispatch with
  # inputs.os ∈ {ubuntu-latest, macos-latest, windows-latest} runs only
  # that lane, while push / pull_request / workflow_dispatch+all keep
  # the full 3-OS matrix. We can't filter via `if: matrix.config.os ==`
  # on the downstream job because the matrix context isn't available
  # in job-level `if` (matrix is expanded after the conditional).
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - id: gen
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_OS: ${{ github.event.inputs.os }}
        run: |
          all='[{"os":"macos-latest","r":"release","args":"c(\"--no-manual\", \"--as-cran\")"},{"os":"windows-latest","r":"release","args":"c(\"--no-manual\", \"--as-cran\")"},{"os":"ubuntu-latest","r":"release","args":"c(\"--no-manual\", \"--as-cran\")"}]'
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$REQUESTED_OS" && "$REQUESTED_OS" != "all" ]]; then
            filtered=$(echo "$all" | jq -c --arg os "$REQUESTED_OS" '[.[] | select(.os == $os)]')
          else
            filtered="$all"
          fi
          echo "matrix={\"config\":$filtered}" >> "$GITHUB_OUTPUT"

  R-CMD-check:
    needs: set-matrix
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.set-matrix.outputs.matrix) }}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      RENV_CONFIG_SANDBOX_ENABLED: false
      RENV_ACTIVATE_PROJECT: 0
      # Required by polars installer (not on CRAN)
      NOT_CRAN: "true"
      # Fallback for `fs` when uv.h is missing on Linux runners
      # (no-op when P3M binary is used)
      USE_BUNDLED_LIBUV: 1

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      # gdtools (transitive dep via ctdR → clusterProfiler) requires cairo + fontconfig.
      # XQuartz is installed only on macOS to provide /opt/X11/lib/libX11.6.dylib,
      # which R 4.6's tcltk was linked against at install time. Without XQuartz,
      # loading tcltk segfaults at first use (the cause of the test_check crash
      # tracked in backlog AI-017). This is the test that confirms whether the
      # segfault is actually in tcltk/X11 or somewhere else.
      - name: Install system libraries (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cairo fontconfig pkg-config libomp
          # libomp is keg-only → symlink so dyld finds it when loading Rfast.so
          sudo ln -sf "$(brew --prefix libomp)/lib/libomp.dylib" "$(brew --prefix)/lib/libomp.dylib"
          brew install --cask xquartz

      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev \
            libcairo2-dev libgit2-dev libsodium-dev

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true   # enables P3M binary packages (no compilation)

      # Cache the R package library keyed on DESCRIPTION hash.
      # Cache hit = 0 installs; only misses when dependencies change.
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ matrix.config.r }}-${{ hashFiles('DESCRIPTION') }}
          restore-keys: ${{ runner.os }}-r-${{ matrix.config.r }}-

      # Use remotes instead of pak/setup-r-dependencies so that
      # Additional_repositories (community.r-multiverse.org for polars) and
      # Remotes (drake69/ctdR) in DESCRIPTION are honoured correctly.
      # pak resolves deps before configuring extra repos, making polars unresolvable.
      #
      # dependencies = NA  →  only Imports/Depends/LinkingTo (skip Suggests).
      # Suggests (pathfindR, GEOquery, caret, …) include heavy Bioconductor packages
      # that are not needed for R CMD check and were the main source of install time.
      - name: Install R dependencies
        run: |
          Sys.setenv(NOT_CRAN = "true")
          # Serial install: parallel install on the Windows runner caused
          # bumphunter to be load-tested before its dep AnnotationDbi was
          # installed (install.packages did not respect the topological
          # dependency order under Ncpus > 1).
          options(Ncpus = 1L)
          # Use the repos configured by setup-r@v2 (with use-public-rspm: true,
          # on Linux this is the distro-specific P3M URL serving binaries).
          # The previous explicit "cran/latest" URL served source on Linux
          # and forced `fs` (and 8 transitive deps) to compile from source,
          # which failed because libuv headers were not on the runner.
          install.packages(
            c("remotes", "rcmdcheck", "testthat", "devtools", "BiocManager")
          )
          remotes::install_deps(
            dependencies = NA,
            repos = c(
              rpolars = "https://community.r-multiverse.org",
              getOption("repos")
            )
          )
          # Install Bioconductor packages used by the test suite. The set is
          # explicitly enumerated and kept in sync by `test-0-suggests-installed.R`,
          # the meta-test that scans every `skip_if_not_installed("pkg")` call in
          # the test files and asserts the named pkg is available. CI fails fast
          # if a test would silently skip due to a missing install here.
          #
          #   IlluminaHumanMethylation*anno  array tech detection
          #   limma                          AI-040 lmFit+eBayes batch path
          #                                  (test-apply_stat_model_batch.R)
          #   AnnotationHub                  test-5-area-granges-build.R
          #   TxDb.Hsapiens.UCSC.hg19.knownGene
          #                                  test-5-annotation-concordance.R,
          #                                  test-5-area-granges-build.R (genomic
          #                                  feature joins)
          BiocManager::install(
            c(
              "IlluminaHumanMethylationEPICanno.ilm10b4.hg19",
              "IlluminaHumanMethylation450kanno.ilmn12.hg19",
              "IlluminaHumanMethylation27kanno.ilmn12.hg19",
              "limma",
              "AnnotationHub",
              "TxDb.Hsapiens.UCSC.hg19.knownGene"
            ),
            ask = FALSE, update = FALSE
          )
          # Install CRAN Suggests that are exercised by the test suite. These
          # are deliberately enumerated (rather than installed via
          # dependencies = "Suggests") because the full Suggests set pulls
          # in heavy chains (pathfindR → ggkegg, ctdR, etc.) that are not
          # needed for R CMD check and that have repeatedly broken CI.
          #   Rfast    test-0-glm_model_bulk.R (AI-044 binomial_bulk)
          #   mockery  test-association_model_limma.R (mocked bindings)
          #   ggpubr   test-2-box-plot.R (box plot rendering)
          install.packages(c("Rfast", "mockery", "ggpubr"))
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          args: ${{ matrix.config.args }}
          error-on: '"error"'
