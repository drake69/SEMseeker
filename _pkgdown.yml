url: https://drake69.github.io/semseeker/

template:
  bootstrap: 5
  bootswatch: flatly
  includes:
    in_header: |
      <script>
        window.vmtrcq = window.vmtrcq || [];
        window.vmtrc = window.vmtrc || function (){window.vmtrcq.push(Array.prototype.slice.call(arguments))};
      </script>
      <script defer src="https://cdn.vemetric.com/main.js" id="vmtrc-scr" data-token="nWIrdnyvzA1sksDn"></script>

home:
  title: "semseeker — Stochastic Epigenetic Mutation Seeker"
  description: >
    Detect, quantify and analyse stochastic epigenetic mutations (SEMs)
    from DNA methylation data.

navbar:
  structure:
    left:  [intro, articles, reference]
    right: [github]
  components:
    intro:
      text: "Get started"
      href: articles/getting-started.html
    articles:
      text: "Articles"
      menu:
        - text: "Getting started — epimutations & delta metrics"
          href: articles/getting-started.html
        - text: "Association analysis — all statistical models"
          href: articles/association-analysis.html
        - text: "Pathway and enrichment analysis"
          href: articles/pathway-analysis.html
    reference:
      text: "Reference"
      href: reference/index.html
    github:
      icon: fab fa-github
      href: https://github.com/drake69/semseeker

reference:
  - title: "Main entry points"
    desc: "Top-level functions for running a full SEM analysis"
    contents:
      - semseeker
      - sem_analyze_population
      - sem_analyze_single_sample
  - title: "Association & statistics"
    desc: "Downstream statistical analysis on SEM results"
    contents:
      - association_analysis
      - assoc_apply_stat_model
  - title: "Delta metrics"
    desc: "Per-region variability summaries"
    contents:
      - sem_delta_single_sample
      - sem_deltar_single_sample
  - title: "Data & annotation"
    desc: "Pivot tables, position annotations, signal helpers"
    contents:
      - anno_annotate_position_pivots
      - io_data_preparation
      - io_build_data_set_from_geo
  - title: "Datasets"
    contents:
      - cytoband_hg19
      - dmr_annotation
      - metrics_properties

footer:
  structure:
    left: developed_by
    right: built_with
